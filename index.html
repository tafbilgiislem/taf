<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
#slider{
width:500px;
height:500px;
}

#slider img{
width:100%;
height:100%;
}
</style>
</head>

<body>

<div id="slider">
<img id="slide" src="">
</div>

<script>

let images = [

"slide1.svg",

"slide2.svg",

"slide3.svg"

];

let index = 0;

function slideShow(){

document.getElementById("slide").src = images[index];

index++;

if(index >= images.length){

index = 0;

}

}

setInterval(slideShow,2000);

slideShow();

</script>

</body>
</html>
